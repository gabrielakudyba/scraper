<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Event Detail — Sample</title>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Event",
        "name": "CES 2026",
        "startDate": "2026-01-06",
        "endDate": "2026-01-09",
        "location": {
          "@type": "Place",
          "name": "Las Vegas Convention Center",
          "address": {
            "addressLocality": "Las Vegas",
            "addressRegion": "NV",
            "addressCountry": "United States"
          }
        }
      }
    </script>
  </head>
  <body>
    <h1>CES 2026</h1>
    <p>Category: Consumer Electronics</p>
    <p>Venue: Las Vegas Convention Center, Nevada, United States</p>
    <p>Dates: 06-09 January 2026</p>
    <section>
      <h2>Previous editions</h2>
      <p>CES 2025, CES 2024, CES 2023 held at Las Vegas Convention Center.</p>
      <p>This event is held annually every year.</p>
    </section>
  </body>
</html>
